name: Build and Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish
        run: |
          dotnet restore
          dotnet publish SDM.API/SDM.API.csproj -c Release -o publish

      - name: Zip publish output
        run: |
          if (Test-Path sdm-publish.zip) { Remove-Item sdm-publish.zip -Force }
          Compress-Archive -Path publish/* -DestinationPath sdm-publish.zip

      - name: Copy and deploy using SSH key file (PowerShell)
        shell: pwsh
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
          TARGET_APP_PATH: ${{ secrets.TARGET_APP_PATH }}
        run: |
          $keyPath = Join-Path $env:RUNNER_TEMP 'deploy_key'
          # write private key to file without adding extra newlines
          Set-Content -Path $keyPath -Value $env:SSH_KEY -NoNewline -Encoding utf8

          # restrict permissions
          icacls $keyPath /inheritance:r
          $currentUser = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
          # Build ACE string separately to avoid parser issues and pass as argument
          $ace = "${currentUser}:(R)"
          icacls $keyPath /grant:r $ace

          # copy files using Start-Process
          $scpArgs1 = @("-i", $keyPath, "-o", "BatchMode=yes", "-o", "StrictHostKeyChecking=no", "sdm-publish.zip", "$($env:SERVER_USER)@$($env:SERVER_HOST):$($env:REMOTE_PATH)")
          Start-Process -FilePath scp -ArgumentList $scpArgs1 -Wait -NoNewWindow
          $scpArgs2 = @("-i", $keyPath, "-o", "BatchMode=yes", "-o", "StrictHostKeyChecking=no", "scripts/remote-deploy.ps1", "$($env:SERVER_USER)@$($env:SERVER_HOST):$($env:REMOTE_PATH)")
          Start-Process -FilePath scp -ArgumentList $scpArgs2 -Wait -NoNewWindow

          # run remote deploy script (construct remote command safely)
          # construct remote command using concatenation to avoid inline $() parsing
          $remoteCommand = 'powershell -NoProfile -ExecutionPolicy Bypass -File "' + ($env:REMOTE_PATH + '\\remote-deploy.ps1') + '" "' + ($env:REMOTE_PATH + '\\sdm-publish.zip') + '" "' + $env:TARGET_APP_PATH + '"'
          $deployArgs = @('-i', $keyPath, '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=no', "$($env:SERVER_USER)@$($env:SERVER_HOST)", $remoteCommand)
          Start-Process -FilePath ssh -ArgumentList $deployArgs -Wait -NoNewWindow

          # remove key
          Remove-Item -Path $keyPath -Force
