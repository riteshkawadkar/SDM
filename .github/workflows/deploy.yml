name: Build and Deploy to Windows Server

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish
        run: |
          dotnet restore
          dotnet publish SDM.API/SDM.API.csproj -c Release -o publish

      - name: Zip publish output
        run: |
          if (Test-Path sdm-publish.zip) { Remove-Item sdm-publish.zip -Force }
          Compress-Archive -Path publish/* -DestinationPath sdm-publish.zip

      - name: Copy publish and deploy script to server (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: '22'
          source: "sdm-publish.zip,scripts/remote-deploy.ps1"
          target: ${{ secrets.REMOTE_PATH }}

      - name: Run remote deploy script (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: '22'
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -File "${{ secrets.REMOTE_PATH }}\remote-deploy.ps1" "${{ secrets.REMOTE_PATH }}\sdm-publish.zip" "${{ secrets.TARGET_APP_PATH }}"
